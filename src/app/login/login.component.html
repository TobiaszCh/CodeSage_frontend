<form autocomplete="on">
    <h1>Login</h1> 
    <div>
        <label>Użytkownik</label>
        <input type="text" name="username" [(ngModel)] = "username"/>
    </div>
    <div>
        <label>Hasło</label>
        <input type="password" name ="password" [(ngModel)] = "password"/>
    </div>
    <button (click) = "login()">Zaloguj </button>
</form>
