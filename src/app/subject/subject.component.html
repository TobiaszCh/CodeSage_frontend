<header>
    <h2>Kurs {{titleFromCourse?.displayName}} - podstawy</h2>
    <button mat-flat-button color="primary" (click)="openAddDialog()">
        <mat-icon>add</mat-icon>
        Dodaj temat
    </button>
</header>
<main>
    <section>
        <ul>
            <li *ngFor="let subject of subjects" >
                <div class="subject-wrapper">
                    <button mat-raised-button class="subject-button" [ngClass]="color(subject.id)" (click)="startAnswerSessionOrCreateQuestions(subject.id)">
                        {{subject.displayName}} 
                    </button>
                    <button
                        mat-icon-button
                        [matMenuTriggerFor]="menu"
                        class="more-horiz"                  
                        (click)="$event.stopPropagation()"  
                    >
                        <mat-icon>more_horiz</mat-icon>
                    </button>
                </div>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openEditDialog(subject.id, subject.displayName)">
                        <mat-icon>edit</mat-icon>
                        Edytuj
                    </button>
                    <button mat-menu-item (click)="openDeleteDialog(subject.id)">
                        <mat-icon class="as">delete</mat-icon>
                        Usuń
                    </button>
                </mat-menu>                 
            </li>
        </ul>
    </section>
</main>
