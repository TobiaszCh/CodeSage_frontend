<header>
    <div class="back">
        <button mat-icon-button (click)="backToCourses()" aria-label="Wróć do kursów">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h2>{{titleFromCourse?.displayName}} - podstawy</h2>
    </div>
    <button mat-flat-button color="primary" (click)="openAddDialog()">
        <mat-icon>add</mat-icon>
        Dodaj temat
    </button>
</header>
<main>
    <section>
        <ul>
            <li *ngFor="let subject of subjects" >
                <div class="subject-wrapper">
                    <button 
                        mat-raised-button 
                        class="subject-button" 
                        [ngClass]="color(subject.id)" 
                        (click)="startAnswerSession(subject.id)">
                        {{subject.displayName}} 
                    </button>
                    <button
                        mat-icon-button
                        [matMenuTriggerFor]="menu"
                        class="more-horiz"                  
                        (click)="$event.stopPropagation(); disabledEdit(subject.id)"  
                    >
                        <mat-icon>more_horiz</mat-icon>
                    </button>
                </div>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openEditDialog(subject.id, subject.displayName)">
                        <mat-icon>edit</mat-icon>
                        Edytuj temat
                    </button>
                    <button mat-menu-item (click)="openDeleteDialog(subject.id)">
                        <mat-icon>delete</mat-icon>
                        Usuń temat
                    </button>
                    <button mat-menu-item [disabled]="openEdit" (click)="goToCreateQuestion(subject.id)">
                        <mat-icon>add</mat-icon>
                        Utwórz pytania do tematu
                    </button>
                    <button mat-menu-item [disabled]="!openEdit" (click)="goToEditQuestion(subject.id)">
                        <mat-icon>edit</mat-icon>
                        Edytuj pytania do tematu
                    </button>                    
                </mat-menu>                 
            </li>
        </ul>
    </section>
</main>
