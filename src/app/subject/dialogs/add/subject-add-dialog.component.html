<h1 mat-dialog-title>Dodaj temat</h1>
  <mat-form-field class="example-full-width">
    <mat-label>Nazwa tematu</mat-label>
    <input matInput value="displayName" [(ngModel)] = "displayName">
  </mat-form-field>
<div mat-dialog-actions class="buttons">
  <button mat-raised-button color = "primary" [mat-dialog-close] = "displayName" cdkFocusInitial>Dodaj</button>
  <button mat-raised-button [mat-dialog-close] = "false">Anuluj</button>
</div>
