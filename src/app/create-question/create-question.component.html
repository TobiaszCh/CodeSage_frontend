
<div class="add">
    <button mat-raised-button color = "primary" (click)="createQuestions(newQuestions)"> Opublikuj zestaw pytań </button>
</div>
<mat-card class="card" *ngFor="let createQuestion of newQuestions; let j = index">
    <mat-form-field>
        <mat-label>Pytanie</mat-label>
        <input matInput [(ngModel)] = "createQuestion.displayName"/>
    </mat-form-field>

    <mat-divider></mat-divider>

    <div class="answers">
        <div *ngFor="let answer of createQuestion.answers; let i = index">
            <mat-radio-button disabled></mat-radio-button>
            <mat-form-field>
                <mat-label>Odpowiedź {{i + 1}}</mat-label>
                <input matInput [(ngModel)] = "answer.displayName">
            </mat-form-field>
        </div>
    </div>

    <mat-divider></mat-divider>

    <div class="correct">
        <h3 class="correct-title">Wskaż dobrą odpowiedź</h3>
    </div>

    <div>
        <mat-radio-group class="correct-group"
        [(ngModel)] = "correctAnswerIndex"
        (change)="correctAnswer(j)"
         >
            <mat-radio-button class="correct-option"
                *ngFor="let answer of createQuestion.answers; let i = index"
                [value] = "i">
                Odpowiedź {{i + 1}}
            </mat-radio-button>
        </mat-radio-group>
    </div>
</mat-card>
