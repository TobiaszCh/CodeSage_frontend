<header>
    <h1>Kursy jęzków programowania </h1>
</header>
<main>
    <ul>
        <li *ngFor="let course of courses">
            <a (click)="nextTemplete(course.id)"> {{course.displayName}} </a>
        </li>
    </ul>
    <input [(ngModel)]="phrase" (ngModelChange)="sendPhrase()">
    <div>{{phrase}}</div>
</main>
