<div class="buttons">
    <button mat-raised-button class = "publish-button" color = "primary" (click)="createOrUpdateQuestions(questions)"> Zapisz </button>
    <button mat-raised-button class = "back-button" (click)="openExitDialog(subjectId)"> Wróć do tematów </button>
</div>

<mat-card class="card-subject">
    <h2>Temat</h2>
    <mat-form-field class="input" appearance="outline">
        <mat-label>Temat</mat-label>
        <input *ngIf = "subject" matInput [(ngModel)] = "subject.displayName" maxlength="50"/>
    </mat-form-field>
    <span class="counter">
        {{subject.displayName.length}} / 50
    </span>
</mat-card>

<mat-card class="card-questions" *ngFor="let question of questions; let j = index">
    <h3>Pytanie {{j + 1}}</h3>

    <mat-form-field class="input" appearance="outline">
        <mat-label>Pytanie</mat-label>
        <input matInput [(ngModel)] = "question.displayName" maxlength="150"/>
    </mat-form-field>

    <span class="counter">
        {{question.displayName.length}} / 150
    </span>

    <mat-divider></mat-divider>

    <div class="answers">
        <div class="section-title">
            <h4>Odpowiedzi</h4>
            <span class="helper">Uzupełnij wszystkie pola</span>
        </div>
    </div>

    <div class = "answer-row" *ngFor="let answer of question.answers; let i = index">
        <mat-form-field  class = "input" appearance="outline">
            <mat-label [ngClass]="{'correct-answer-backround': answer.isCorrect}">Odpowiedź {{i + 1}}</mat-label>
            <input matInput [(ngModel)] = "answer.displayName" maxlength="200">
        </mat-form-field>
        <span class="counter">
            {{answer.displayName.length || 0}} / 200
        </span>
    </div>

    <mat-divider></mat-divider>

    <div>
        <h3 class="correct-title">Wskaż dobrą odpowiedź</h3>
    </div>

    <mat-radio-group class="group-answers"
    [(ngModel)] = "question.indexCorrectAnswer"
    (change)="correctAnswer(j, question.indexCorrectAnswer)">
        <mat-radio-button class="radio-button"
            *ngFor="let answer of question.answers; let i = index"
            [value] = "i">
            Odpowiedź {{i + 1}}
        </mat-radio-button>
    </mat-radio-group>
</mat-card>
