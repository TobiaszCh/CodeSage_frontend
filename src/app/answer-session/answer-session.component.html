<header>
    <mat-icon class="close" (click)="openExitDialog()">close</mat-icon>
</header>
<main>
    <mat-progress-bar mode="determinate" [value]="progress()"></mat-progress-bar>
    <h1>{{question.displayName}}</h1>
    <mat-radio-group class="e" [(ngModel)]="checkAnswer">
        <div
            class="radio-button"
            *ngFor="let answer of question!.answers"
            (click)="blockCheck && checkAnswer = answer.id"
            [ngClass]="{
                'correct-answer': showResult && answer.id == correctAnswerId, 
                'wrong-answer': showResult && answer.id != correctAnswerId && answer.id == sendedAsnwerId,
                'block-cursor': blockNext 
                }"
            >
            <mat-radio-button 
                [value]="answer.id" 
                [disabled]="blockAnswer">
            </mat-radio-button>
            {{answer?.displayName}}
        </div>
    </mat-radio-group>
    <div>
        <button mat-raised-button color = "primary"
            (click)="selectQuestionAnswer(answerSessionId, question!.id, checkAnswer);"
            *ngIf="blockCheck">
            Sprawdź
        </button>
        <button mat-raised-button color = "primary" (click)="nextQuestion(answerSessionId)" *ngIf="blockNext">
            Dalej
        </button>
    </div>
    <div class="feedback" *ngIf="showMeInform">{{informForUser()}} </div>
</main>
