<header>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
    <div class="point"></div>
</header>
<main>
    <h2>{{question?.displayName}}</h2>
    <ul>
        <li *ngFor="let answer of question?.answers">
            <label>
                <input type="radio" name="a" [value]="answer.id" [(ngModel)]="checkAnswer" [disabled]="blockAnswer" />
                {{answer?.displayName}}
            </label>
        </li>
    </ul>
    <div class="div-button">
        <button class="button1" (click)="selectQuestionAnswer(answerSessionId, question!.id, checkAnswer)" *ngIf="blockCheck">
            Sprawdź
        </button>
        <button class="button1" (click)="nextQuestion(answerSessionId)" *ngIf="blockNext">
            Dalej
        </button>
        <button class="button1" (click)="nextTemplete()" *ngIf="blockEnd">
            Zakończ
        </button>
    </div>
    <div class="div-good-answer" *ngIf="showMeInform">{{informForUser()}} </div>

</main>
